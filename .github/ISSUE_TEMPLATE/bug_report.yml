name: Bug report
description: Report something that is broken or misleading.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken or misleading?
      placeholder: The social actor map overflows on...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can someone else see the issue?
      placeholder: |
        1. Open the demo
        2. Switch to ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Browser, viewport size, scenario, policy settings, or screenshots.
